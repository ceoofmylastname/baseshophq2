name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# TODO: re-add prettier --check to CI after a one-shot format pass on src/.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: test (bun test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Run tests
        run: |
          if find tests src -name '*.test.ts' -print -quit 2>/dev/null | grep -q .; then
            bun test
          else
            echo "No tests yet, skipping. TODO: remove this branch once a test exists."
          fi

  migration-check:
    name: migration-check (supabase db reset)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/supabase
          key: supabase-cli-${{ runner.os }}-v2.98.2
      - uses: supabase/setup-cli@v1
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        with:
          version: 2.98.2
      - name: Start local Supabase
        run: supabase start --exclude=studio,realtime,storage-api,imgproxy,inbucket,edge-runtime,logflare,vector
      - name: Reset DB (applies migrations + seed.sql if present)
        run: supabase db reset --local
      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
