<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0C" />
    <meta name="color-scheme" content="dark" />

    <title>Baseshop HQ — Run your agency like it's already won</title>
    <meta
      name="description"
      content="The agency-management platform built for life insurance shops. Track every policy, auto-route every carrier CSV, see every agent's rank in real time. One platform for small shops and 500-agent operations alike."
    />

    <!-- Favicons. SVG for modern browsers, ICO fallback for legacy, Apple touch icon for iOS home screen. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#F0B330" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, WhatsApp, Discord, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Baseshop HQ" />
    <meta property="og:url" content="https://baseshophq.com/" />
    <meta property="og:title" content="Baseshop HQ — Run your agency like it's already won" />
    <meta
      property="og:description"
      content="The agency-management platform built for life insurance shops. Track every policy, auto-route every carrier CSV, see every agent's rank in real time."
    />
    <meta property="og:image" content="https://baseshophq.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://baseshophq.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Baseshop HQ — Run your agency like it's already won. Built for life insurance agencies."
    />

    <!-- Twitter / X large summary card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Baseshop HQ — Run your agency like it's already won" />
    <meta
      name="twitter:description"
      content="The agency-management platform built for life insurance shops. Track every policy, auto-route every carrier CSV, see every agent's rank in real time."
    />
    <meta name="twitter:image" content="https://baseshophq.com/og-image.png" />
    <meta name="twitter:image:alt" content="Baseshop HQ marketing card" />

    <!-- Apple PWA / fullscreen on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Baseshop HQ" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
