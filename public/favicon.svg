<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(48 100% 80%)"/>
      <stop offset="55%" stop-color="hsl(38 92% 60%)"/>
      <stop offset="100%" stop-color="hsl(30 88% 50%)"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0B0B0C"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <!-- Rounded-square background with subtle gradient -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)" stroke="hsl(38 92% 60% / 0.25)" stroke-width="1"/>

  <!-- Soft inner gold glow halo -->
  <ellipse cx="32" cy="34" rx="22" ry="14" fill="hsl(38 92% 60% / 0.10)" filter="url(#glow)"/>

  <!-- Three stacked tiers narrowing upward — the position-ladder mark -->
  <!-- Bottom (widest) tier -->
  <path d="M 14 50 L 50 50 L 46 42 L 18 42 Z" fill="url(#goldGrad)" opacity="0.55"/>
  <!-- Middle tier -->
  <path d="M 20 40 L 44 40 L 41 30 L 23 30 Z" fill="url(#goldGrad)" opacity="0.82"/>
  <!-- Top tier -->
  <path d="M 25 28 L 39 28 L 37 14 L 27 14 Z" fill="url(#goldGrad)"/>

  <!-- Apex dot -->
  <circle cx="32" cy="11" r="2.6" fill="hsl(48 100% 85%)"/>
  <circle cx="32" cy="11" r="4.5" fill="hsl(48 100% 85% / 0.30)"/>
</svg>
